<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>raythm</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d0d;
      --bg2:       #141414;
      --bg3:       #1c1c1c;
      --border:    #2a2a2a;
      --green:     #a855f7;
      --green-dim: #6b21a8;
      --white:     #e8e8e8;
      --gray:      #666;
      --accent:    #d8b4fe;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--white);
      font-family: 'Share Tech Mono', 'Courier New', monospace;
    }

    /* scanline overlay */
    body::before {
      content: '';
      pointer-events: none;
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.08) 3px,
        rgba(0,0,0,0.08) 4px
      );
      z-index: 999;
    }

    /* ── layout ── */
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      gap: 0;
    }

    /* ── terminal window ── */
    .window {
      width: 100%;
      max-width: 680px;
      border: 1px solid var(--border);
      background: var(--bg2);
    }

    .titlebar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--gray);
      user-select: none;
    }

    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--border);
    }
    .dot.r { background: #e05252; }
    .dot.y { background: #d4aa3c; }
    .dot.g { background: var(--green-dim); }

    .titlebar-name {
      margin-left: auto;
      margin-right: auto;
      letter-spacing: .05em;
    }

    .body {
      padding: 36px 40px 40px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    /* ── logo / title ── */
    .logo-block {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .logo {
      font-size: clamp(36px, 8vw, 56px);
      font-weight: normal;
      color: var(--accent);
      letter-spacing: .12em;
      line-height: 1;
    }

    .logo span {
      color: var(--green);
    }

    .tagline {
      font-size: 12px;
      color: var(--gray);
      letter-spacing: .08em;
    }

    /* ── divider ── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
    }

    /* ── info block ── */
    .info {
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 13px;
    }

    .info-row {
      display: flex;
      gap: 12px;
    }

    .info-key {
      color: var(--green);
      min-width: 120px;
    }

    .info-val {
      color: var(--white);
    }

    .info-val.loading {
      color: var(--gray);
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── download button ── */
    .dl-wrap {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .dl-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 24px;
      background: var(--green);
      color: #0d0d0d;
      font-family: inherit;
      font-size: 15px;
      letter-spacing: .1em;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: background .1s, transform .08s;
    }

    .dl-btn:hover  { background: var(--accent); }
    .dl-btn:active { transform: translateY(1px); }

    .dl-btn.disabled {
      background: var(--bg3);
      color: var(--gray);
      cursor: default;
      pointer-events: none;
    }

    .dl-icon { font-size: 18px; }

    .dl-sub {
      font-size: 11px;
      color: var(--gray);
      text-align: center;
      letter-spacing: .05em;
    }

    /* ── footer ── */
    .footer {
      margin-top: 24px;
      font-size: 11px;
      color: var(--gray);
      letter-spacing: .06em;
      display: flex;
      gap: 24px;
    }

    .footer a {
      color: var(--gray);
      text-decoration: none;
    }
    .footer a:hover { color: var(--green); }

    /* ── error ── */
    .error { color: #e05252; font-size: 12px; display: none; }
  </style>
</head>
<body>
<main class="page">

  <div class="window">
    <div class="titlebar">
      <div class="dot r"></div>
      <div class="dot y"></div>
      <div class="dot g"></div>
      <span class="titlebar-name">raythm.exe</span>
    </div>

    <div class="body">

      <div class="logo-block">
        <div class="logo">ray<span>thm</span></div>
        <div class="tagline">&gt; rhythm game / windows x64</div>
      </div>

      <hr class="divider">

      <div class="info">
        <div class="info-row">
          <span class="info-key">version</span>
          <span class="info-val loading" id="val-version">loading...</span>
        </div>
        <div class="info-row">
          <span class="info-key">build date</span>
          <span class="info-val loading" id="val-date">loading...</span>
        </div>
        <div class="info-row">
          <span class="info-key">file size</span>
          <span class="info-val loading" id="val-size">loading...</span>
        </div>
        <div class="info-row">
          <span class="info-key">platform</span>
          <span class="info-val">Windows x64</span>
        </div>
      </div>

      <div class="dl-wrap">
        <a class="dl-btn disabled" id="dl-btn" href="#" download>
          <span class="dl-icon">&#9660;</span>
          <span id="dl-label">DOWNLOAD</span>
        </a>
        <div class="dl-sub" id="dl-sub">&nbsp;</div>
        <div class="error" id="error-msg"></div>
      </div>

    </div>
  </div>

  <footer class="footer">
    <a href="https://github.com/Rofutok112/raythm" target="_blank">&gt; github</a>
    <a href="https://github.com/Rofutok112/raythm/releases" target="_blank">&gt; all releases</a>
    <a href="https://github.com/Rofutok112/raythm/issues" target="_blank">&gt; issues</a>
  </footer>

</main>

<script>
  const API = 'https://api.github.com/repos/Rofutok112/raythm/releases';

  function fmtSize(bytes) {
    return (bytes / 1024 / 1024).toFixed(1) + ' MB';
  }

  function fmtDate(iso) {
    const d = new Date(iso);
    return d.toISOString().slice(0, 10);
  }

  function extractVersion(name) {
    // e.g. "raythm-2026.04.05.8-windows-x64.exe" → "2026.04.05.8"
    const m = name.match(/raythm-([0-9.]+)-windows/);
    return m ? m[1] : name;
  }

  async function load() {
    try {
      const res = await fetch(API + '?per_page=20');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const releases = await res.json();

      // 最新の Windows exe アセットを探す
      let asset = null;
      let release = null;
      for (const r of releases) {
        asset = r.assets.find(a => a.name.includes('windows') && a.name.endsWith('.exe'));
        if (asset) { release = r; break; }
      }

      if (!asset) throw new Error('Windows build not found');

      const version = extractVersion(asset.name);

      document.getElementById('val-version').textContent = version;
      document.getElementById('val-version').classList.remove('loading');

      document.getElementById('val-date').textContent = fmtDate(asset.updated_at);
      document.getElementById('val-date').classList.remove('loading');

      document.getElementById('val-size').textContent = fmtSize(asset.size);
      document.getElementById('val-size').classList.remove('loading');

      const btn = document.getElementById('dl-btn');
      btn.href = asset.browser_download_url;
      btn.classList.remove('disabled');
      document.getElementById('dl-label').textContent = 'DOWNLOAD  ' + asset.name;
      document.getElementById('dl-sub').textContent =
        '↳ ' + release.name;

    } catch (e) {
      ['val-version','val-date','val-size'].forEach(id => {
        const el = document.getElementById(id);
        el.textContent = 'N/A';
        el.classList.remove('loading');
      });
      const err = document.getElementById('error-msg');
      err.style.display = 'block';
      err.textContent = '> error: ' + e.message;
    }
  }

  load();
</script>
</body>
</html>
