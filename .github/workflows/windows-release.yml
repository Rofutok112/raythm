name: Windows Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: windows-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            base-devel
            git
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja

      - name: Install NSIS
        shell: powershell
        run: |
          choco install nsis --no-progress -y
          "${env:ProgramFiles(x86)}\NSIS" >> $env:GITHUB_PATH

      - name: Compute release metadata
        id: meta
        shell: powershell
        run: |
          $timestamp = Get-Date -Format "yyyyMMdd-HHmmss"
          $major = Get-Date -Format "yyyy"
          $minor = Get-Date -Format "MMdd"
          $packageVersion = "$major.$minor.$env:GITHUB_RUN_NUMBER"
          $shortSha = "${env:GITHUB_SHA}".Substring(0, 7)
          $assetName = "raythm-$packageVersion-windows-x64"
          $tag = "v$packageVersion"
          $releaseName = "raythm main build $timestamp ($shortSha)"
          $installerPath = "dist/$assetName.exe"
          $installRoot = "dist/$assetName"
          $zipPath = "dist/game-win64.zip"
          $checksumPath = "dist/SHA256SUMS.txt"

          "package_version=$packageVersion" >> $env:GITHUB_OUTPUT
          "asset_name=$assetName" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "release_name=$releaseName" >> $env:GITHUB_OUTPUT
          "installer_path=$installerPath" >> $env:GITHUB_OUTPUT
          "install_root=$installRoot" >> $env:GITHUB_OUTPUT
          "zip_path=$zipPath" >> $env:GITHUB_OUTPUT
          "checksum_path=$checksumPath" >> $env:GITHUB_OUTPUT

      - name: Configure
        shell: msys2 {0}
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          "-DRAYTHM_PACKAGE_VERSION=${{ steps.meta.outputs.package_version }}"
          "-DRAYTHM_PACKAGE_FILE_NAME=${{ steps.meta.outputs.asset_name }}"

      - name: Build
        shell: msys2 {0}
        run: cmake --build build --config Release --target raythm raythm_launcher raythm_updater --parallel

      - name: Package installer
        shell: msys2 {0}
        run: cpack --config build/CPackConfig.cmake -G NSIS -B dist

      - name: Prepare portable update package
        shell: powershell
        run: |
          $installRoot = "${{ steps.meta.outputs.install_root }}"
          $zipPath = "${{ steps.meta.outputs.zip_path }}"
          $checksumPath = "${{ steps.meta.outputs.checksum_path }}"
          $distDir = Split-Path -Parent $zipPath

          if (Test-Path $installRoot) {
            Remove-Item -LiteralPath $installRoot -Recurse -Force
          }
          if (!(Test-Path $distDir)) {
            New-Item -ItemType Directory -Path $distDir | Out-Null
          }
          if (Test-Path $zipPath) {
            Remove-Item -LiteralPath $zipPath -Force
          }
          if (Test-Path $checksumPath) {
            Remove-Item -LiteralPath $checksumPath -Force
          }

          cmake --install build --prefix $installRoot
          Compress-Archive -Path (Join-Path $installRoot '*') -DestinationPath $zipPath -CompressionLevel Optimal

          $hash = (Get-FileHash -LiteralPath $zipPath -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash *game-win64.zip" | Set-Content -LiteralPath $checksumPath -NoNewline

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.asset_name }}
          path: |
            ${{ steps.meta.outputs.installer_path }}
            ${{ steps.meta.outputs.zip_path }}
            ${{ steps.meta.outputs.checksum_path }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.release_name }}
          generate_release_notes: true
          prerelease: false
          files: |
            ${{ steps.meta.outputs.installer_path }}
            ${{ steps.meta.outputs.zip_path }}
            ${{ steps.meta.outputs.checksum_path }}
